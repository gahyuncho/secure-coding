{% extends "base.html" %}
{% block content %}
<h2>{{ peer.username }}님과의 채팅</h2>
<div id="messages" style="border:1px solid #ddd; height:300px; overflow-y:auto; padding:8px;">
  {% for m in history %}
    <div><strong>{{ m.sender.username }}</strong>: {{ m.content }}</div>
  {% endfor %}
</div>
<input id="msg-input" type="text" maxlength="1000" placeholder="메시지 입력">
<button id="send-btn">전송</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const socket = io();
  const peerUsername = {{ peer.username | tojson }};
  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("msg-input");

  function appendMessage(sender, content) {
    const div = document.createElement("div");
    const strong = document.createElement("strong");
    strong.innerText = sender;
    div.appendChild(strong);
    div.appendChild(document.createTextNode(": " + content));
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  socket.on("connect", () => {
    socket.emit("join_dm", { peer_username: peerUsername });
  });

  socket.on("new_dm", (data) => {
    appendMessage(data.sender, data.content);
  });

  document.getElementById("send-btn").addEventListener("click", () => {
    const content = input.value.trim();
    if (!content) return;
    socket.emit("send_dm", { peer_username: peerUsername, content });
    input.value = "";
  });
</script>
{% endblock %}
